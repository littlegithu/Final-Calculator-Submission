<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="os-window">
        <div class="calculator-container">
            <div class="display-screen">
                <div id="previous-operand" class="previous-operand"></div>
                <div id="current-operand" class="current-operand">0</div>
            </div>
            <div class="keypad">
                <button class="span-two" onclick="clearDisplay()">AC</button>
                <button onclick="deleteLast()">DEL</button>
                <button class="operator-btn" onclick="chooseOperation('/')">÷</button>
                
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator-btn" onclick="chooseOperation('*')">×</button>
                
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator-btn" onclick="chooseOperation('-')">-</button>
                
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="operator-btn" onclick="chooseOperation('+')">+</button>
                
                <button onclick="appendNumber('.')">.</button>
                <button onclick="appendNumber('0')">0</button>
                <button class="span-two action-btn" onclick="compute()">=</button>
            </div>
        </div>

        <div class="history-container">
            <h3>Log</h3>
            <ul id="history-list">
            </ul>
            <button id="clear-history" onclick="clearHistory()">Clear Log</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
